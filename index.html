<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluador de predicciones - Resistencia del concreto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 850px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
      color: #222;
    }
    h1 { margin-bottom: 0.2em; }
    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      background: #fafafa;
    }
    input[type="file"] { margin-top: 10px; }
    button {
      margin-top: 15px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      background: #222;
      color: white;
    }
    button:hover { opacity: 0.9; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    th { background: #f0f0f0; }
    .error { color: #b00020; font-weight: bold; }
    .ok { color: #006400; font-weight: bold; }
    code { background: #eee; padding: 2px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Evaluador de predicciones</h1>
  <p>
    Subí un archivo CSV con una columna llamada
    <code>resistencia_compresion</code>. El sistema comparará esas predicciones
    contra las etiquetas verdaderas del conjunto de test.
  </p>

  <div class="box">
    <label for="csvFile"><strong>Archivo CSV del alumno:</strong></label><br />
    <input type="file" id="csvFile" accept=".csv" />
    <br />
    <button onclick="evaluarCSV()">Evaluar</button>
    <div id="mensaje"></div>
  </div>

  <div id="resultados"></div>

  <script>
    // Etiquetas verdaderas del test.
    // ADVERTENCIA: al estar en el frontend, estos valores pueden ser vistos por cualquiera.
    // Sirve para práctica o corrección informal, no para una competencia segura.

02188, 24.40055564, 28.62980142, 14.5968964, 26.32281473, 69.65776028, 35.57006684, 4.827710952, 26.200088, 9.86640156, 22.31833812, 33.72916592, 32.6266938, 10.73031499, 17.59680647, 33.19206412, 41.2996124, 10.53588276, 20.91870184, 10.08979178, 40.14818748, 4.565020596, 41.36856, 37.36339392, 51.73276323, 17.20035777, 2.331807832, 63.52831864, 44.52045028, 27.42046052, 26.91369566, 31.35047372, 35.85964676, 43.5748832, 36.14922668, 32.90179472, 50.73233356, 56.8472962, 21.17932377, 50.51101176, 59.79825348, 13.52062436, 43.0577762, 38.45897128, 12.5484632, 17.8229546, 47.7144971, 15.69109481, 67.30664712, 61.92183956, 43.6982994];

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          row.push(cell.trim());
          cell = '';
        } else if ((char === '
' || char === '') && !insideQuotes) {
          if (char === '' && nextChar === '
') i++;
          row.push(cell.trim());
          if (row.some(value => value !== '')) rows.push(row);
          row = [];
          cell = '';
        } else {
          cell += char;
        }
      }

      if (cell.length > 0 || row.length > 0) {
        row.push(cell.trim());
        if (row.some(value => value !== '')) rows.push(row);
      }
      return rows;
    }

    function extraerColumna(rows, columnName) {
      if (rows.length < 2) {
        throw new Error('El CSV debe tener encabezado y al menos una fila de datos.');
      }

      const header = rows[0].map(h => h.trim());
      const colIndex = header.indexOf(columnName);

      if (colIndex === -1) {
        throw new Error(`No se encontró la columna "${columnName}".`);
      }

      const values = [];
      for (let i = 1; i < rows.length; i++) {
        const raw = rows[i][colIndex];
        const value = Number(String(raw).replace(',', '.'));
        if (!Number.isFinite(value)) {
          throw new Error(`Valor inválido en la fila ${i + 1}: "${raw}".`);
        }
        values.push(value);
      }
      return values;
    }

    function mean(values) {
      return values.reduce((a, b) => a + b, 0) / values.length;
    }

    function calcularMetricas(yTrue, yPred) {
      if (yTrue.length !== yPred.length) {
        throw new Error(
          `Cantidad de predicciones incorrecta. Esperadas: ${yTrue.length}. Recibidas: ${yPred.length}.`
        );
      }

      const n = yTrue.length;
      let sumSquaredError = 0;
      let sumAbsoluteError = 0;
      const yMean = mean(yTrue);
      let totalSumSquares = 0;

      for (let i = 0; i < n; i++) {
        const error = yTrue[i] - yPred[i];
        sumSquaredError += error ** 2;
        sumAbsoluteError += Math.abs(error);
        totalSumSquares += (yTrue[i] - yMean) ** 2;
      }

      const mse = sumSquaredError / n;
      const rmse = Math.sqrt(mse);
      const mae = sumAbsoluteError / n;
      const r2 = 1 - sumSquaredError / totalSumSquares;

      return { mse, rmse, mae, r2 };
    }

    function mostrarMetricas(metricas) {
      const resultados = document.getElementById('resultados');
      resultados.innerHTML = `
        <div class="box">
          <h2>Resultados</h2>
          <table>
            <thead>
              <tr>
                <th>Métrica</th>
                <th>Valor</th>
                <th>Interpretación</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>MSE</td>
                <td>${metricas.mse.toFixed(4)}</td>
                <td>Menor es mejor. Penaliza más los errores grandes.</td>
              </tr>
              <tr>
                <td>RMSE</td>
                <td>${metricas.rmse.toFixed(4)}</td>
                <td>Menor es mejor. Está en las mismas unidades que la variable objetivo.</td>
              </tr>
              <tr>
                <td>MAE</td>
                <td>${metricas.mae.toFixed(4)}</td>
                <td>Menor es mejor. Error absoluto promedio.</td>
              </tr>
              <tr>
                <td>R²</td>
                <td>${metricas.r2.toFixed(4)}</td>
                <td>Mayor es mejor. 1 indica ajuste perfecto; puede ser negativo.</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function evaluarCSV() {
      const input = document.getElementById('csvFile');
      const mensaje = document.getElementById('mensaje');
      const resultados = document.getElementById('resultados');

      mensaje.innerHTML = '';
      resultados.innerHTML = '';

      if (!input.files || input.files.length === 0) {
        mensaje.innerHTML = '<p class="error">Primero seleccioná un archivo CSV.</p>';
        return;
      }

      const file = input.files[0];
      const reader = new FileReader();

      reader.onload = function(event) {
        try {
          const text = event.target.result;
          const rows = parseCSV(text);
          const yPred = extraerColumna(rows, 'resistencia_compresion');
          const metricas = calcularMetricas(yTrue, yPred);

          mensaje.innerHTML = '<p class="ok">Archivo evaluado correctamente.</p>';
          mostrarMetricas(metricas);
        } catch (error) {
          mensaje.innerHTML = `<p class="error">Error: ${error.message}</p>`;
        }
      };

      reader.onerror = function() {
        mensaje.innerHTML = '<p class="error">No se pudo leer el archivo.</p>';
      };

      reader.readAsText(file);
    }
  </script>
</body>
</html>
